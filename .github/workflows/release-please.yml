name: release-please

on:
  push:
    branches: [main]

# Least-privilege at the top; the publish job widens id-token below.
permissions: {}

jobs:
  # 1) Maintain the "Release PR". When a human merges it, cut the tag + GitHub Release.
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # 2) Publish to npm — only after a release was actually created.
  #    Uses npm Trusted Publishing (OIDC): no NPM_TOKEN secret, provenance is automatic.
  #    PREREQUISITE: configure the trusted publisher on npmjs.com
  #    (package settings → Trusted Publisher → repo=tokiya-takai/par, workflow=release-please.yml).
  #    Until M1 lands a real build, this job stays dormant (no release PR is merged yet).
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@11 # trusted publishing needs npm >= 11.5.1 (npm 11 runs on node >= 22.9)
      - run: npm ci
      - run: npm run build
      - run: npm publish
